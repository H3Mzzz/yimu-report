name: 一木财务报告 - 日报

on:
  # schedule:
  #   - cron: "0 15 * * *"      # 每天 UTC 15:00 (北京时间 23:00)
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      REPORT_MODE: daily
      QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
      QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
      WEBDAV_BASE_URL: ${{ secrets.WEBDAV_BASE_URL }}
      WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
      WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
      WEBDAV_BACKUP_FOLDER: ${{ secrets.WEBDAV_BACKUP_FOLDER }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: 生成并发送报告
        run: python main.py
